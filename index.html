<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>श्री टटिया स्थान उत्सव - २०२६</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        :root {
            --bg-body: #eef2f3;
            --bg-card: #ffffff;
            --text-dark: #2b323c;
            --accent-yellow: #f3d778;
            --calendar-bg: #2b323c;
            --calendar-text: #ffffff;
            --btn-bg: #d35400;
            --gold: #d4af37;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #8e9eab, #eef2f3);
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
        }

        .header-section { text-align: center; margin-bottom: 30px; }
        .top-mantra {
            background-color: var(--bg-card); display: inline-block; padding: 15px 30px;
            border-radius: 50px; font-size: 1.2rem; font-weight: 800;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 2px dashed var(--btn-bg); color: var(--btn-bg);
        }

        .main-container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1000px; margin: 0 auto; justify-content: center; align-items: flex-start; }
        
        /* Calendar UI */
        .calendar-wrapper { flex: 1 1 350px; background-color: var(--calendar-bg); border-radius: 15px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); color: var(--calendar-text); }
        .month-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-header button { background: rgba(255,255,255,0.1); border: none; color: var(--accent-yellow); font-size: 1.2rem; cursor: pointer; border-radius: 50%; width: 35px; height: 35px; transition: 0.3s; }
        .month-header button:hover { background: var(--accent-yellow); color: var(--calendar-bg); }
        .month-header h2 { margin: 0; color: var(--accent-yellow); font-size: 1.4rem; }
        .days-of-week { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #a0aab2; font-size: 0.9rem; margin-bottom: 10px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; text-align: center; }
        .calendar-day { padding: 10px 0; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .calendar-day.empty { pointer-events: none; }
        .calendar-day.festival-day { background-color: var(--accent-yellow); color: var(--calendar-bg); font-weight: bold; box-shadow: 0 4px 10px rgba(243, 215, 120, 0.4); transform: scale(1.05); }
        .calendar-day:not(.empty):not(.festival-day):hover { background-color: rgba(255,255,255,0.1); }

        /* Events UI */
        .events-wrapper { flex: 1 1 400px; background-color: var(--bg-card); border-radius: 15px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-height: 500px; overflow-y: auto; }
        .events-title { font-size: 1.2rem; border-bottom: 3px solid var(--accent-yellow); padding-bottom: 10px; margin-top: 0; }
        .event-card { background: #f9f9f9; padding: 15px; border-radius: 10px; border-left: 5px solid var(--btn-bg); margin-bottom: 15px; transition: 0.3s; }
        .event-card:hover { transform: translateX(5px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .event-card h4 { margin: 0 0 5px 0; color: var(--text-dark); font-size: 1.05rem; }
        .event-card p { margin: 0; font-size: 0.85rem; color: #555; }
        .no-events { text-align: center; color: #888; font-style: italic; margin-top: 30px; }

        /* Buttons */
        .action-buttons { display: flex; justify-content: center; gap: 15px; margin-top: 30px; flex-wrap: wrap; }
        .action-btn { background-color: var(--btn-bg); color: white; border: none; padding: 10px 20px; border-radius: 25px; font-size: 1rem; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 10px rgba(211, 84, 0, 0.3); }
        .action-btn:hover { background-color: #a04000; transform: translateY(-2px); }

        /* Floating Admin Link */
        .admin-floating-btn {
            position: fixed; bottom: 20px; right: 20px; background: var(--gold); color: #000;
            border: none; border-radius: 50px; padding: 12px 20px; font-size: 1rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: all 0.3s ease; text-decoration: none; z-index: 100;
        }
        .admin-floating-btn:hover { transform: scale(1.05); }

        .events-wrapper::-webkit-scrollbar { width: 6px; }
        .events-wrapper::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        @media (max-width: 768px) { .top-mantra { font-size: 1rem; padding: 10px 20px; } }
        @media print { .admin-floating-btn, .action-buttons { display: none !important; } }
    </style>
</head>
<body>

    <div class="header-section">
        <div class="top-mantra">॥ श्यामा प्यारी कुंजबिहारी जै जै श्री हरिदास दुलारी ॥</div>
        <p style="margin-top: 10px; color: #555; font-weight: 600;">श्री टटिया स्थान उत्सव पंचांग</p>
    </div>

    <div class="main-container">
        <div class="calendar-wrapper">
            <div class="month-header">
                <button id="prevBtn" title="पिछला महीना">&#10094;</button>
                <h2 id="monthYearDisplay">January 2026</h2>
                <button id="nextBtn" title="अगला महीना">&#10095;</button>
            </div>
            <div class="days-of-week">
                <div>Mo</div><div>Tu</div><div>We</div><div>Th</div><div>Fr</div><div>Sa</div><div>Su</div>
            </div>
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <div class="events-wrapper">
            <h3 class="events-title" id="eventsMonthTitle">इस माह के उत्सव</h3>
            <div id="eventList"></div>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn" id="shareBtn">📤 शेयर करें (Text)</button>
        <button class="action-btn" id="printBtn">📥 PDF डाउनलोड करें</button>
    </div>


    <script>
        const defaultFestivalData = {
            "2026-01-14": { title: "१. जागरण उत्सव", desc: "माघ कृष्ण 11 - समाज गायन 5 दिन चलता है।" },
            "2026-01-23": { title: "२. श्रीस्वामी रसिकदेवजी महाराज का प्राकट्योत्सव", desc: "बसंत पंचमी (माघ शुक्ल 5)" },
            "2026-03-04": { title: "३. श्रीबिहारी बिहारिनि कौं होली महोत्सव", desc: "फाल्गुन शुक्ल 15 (होली) - 8 दिन समाज गायन।" },
            "2026-03-15": { title: "४. श्रीस्वामी राधाचरणदासजी महाराज का प्राकट्योत्सव", desc: "चैत्र कृष्ण 11" },
            "2026-03-29": { title: "५. फूल-डोल एकादशी", desc: "चैत्र शुक्ल 11 - प्रथम फूलबंगला प्रारम्भ" },
            "2026-04-19": { title: "६. अक्षय तृतीया चरण दर्शन महोत्सव", desc: "वैशाख शुक्ल 3" },
            "2026-05-03": { title: "७. श्रीस्वामी नरहरिदेवजी महाराज का प्राकट्योत्सव", desc: "ज्येष्ठ कृष्ण 2" },
            "2026-06-18": { title: "८. श्रीस्वामी राधाप्रसाद देवजू महाराज का उत्सव", desc: "ज्येष्ठ शुक्ल 4" },
            "2026-06-20": { title: "९. श्रीस्वामी राधाशरण देवजू महाराज का उत्सव", desc: "ज्येष्ठ शुक्ल 6" },
            "2026-06-25": { title: "१०. मोहिनी निकुंज अनमोल श्रीटटिया स्थान उत्सव", desc: "ज्येष्ठ शुक्ल 11 (निर्जला एकादशी)" },
            "2026-07-09": { title: "११. वर्तमान विराजमान श्रीस्वामी गद्दी महोत्सव", desc: "आषाढ़ कृष्ण 10" },
            "2026-07-29": { title: "१२. श्रीगुरुपूर्णिमा पावस महोत्सव", desc: "आषाढ़ शुक्ल 15" },
            "2026-08-15": { title: "१३. श्रीस्वामी बिहारिनिदेवजू प्राकट्योत्सव एवं झूलनोत्सव", desc: "श्रावण शुक्ल 3 (हरियाली तीज)" },
            "2026-09-19": { title: "१४. श्रीराधाष्टमी महोत्सव", desc: "भाद्रपद शुक्ल 8 - 7 दिन का बृहद् महोत्सव।" },
            "2026-10-20": { title: "१५. दशहरा उत्सव", desc: "आश्विन शुक्ल 10" },
            "2026-10-25": { title: "१६. शरदोत्सव", desc: "आश्विन शुक्ल 15 (शरद पूर्णिमा)" },
            "2026-12-01": { title: "१७. अन्नकूट महोत्सव", desc: "अगहन कृष्ण 8 - 4 दिन समाज गायन।" },
            "2026-12-05": { title: "१८. श्रीस्वामी रणछोरदास जी महाराज का उत्सव", desc: "अगहन कृष्ण 12" },
            "2026-12-14": { title: "१९. बिहार पंचमी महोत्सव", desc: "अगहन शुक्ल 5 (विवाह पंचमी) - 4 दिन समाज गायन।" }
        };

        // Shared LocalStorage
        let festivalData = JSON.parse(localStorage.getItem('tatiyaSthanFestivals')) || defaultFestivalData;
        
        let currentDate = new Date(2026, 0, 1); 
        const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
        const hindiMonths = ["जनवरी", "फरवरी", "मार्च", "अप्रैल", "मई", "जून", "जुलाई", "अगस्त", "सितंबर", "अक्टूबर", "नवंबर", "दिसंबर"];

        function renderCalendar(date) {
            const year = date.getFullYear();
            const month = date.getMonth();
            
            document.getElementById("monthYearDisplay").textContent = `${monthNames[month]} ${year}`;
            document.getElementById("eventsMonthTitle").textContent = `${hindiMonths[month]} ${year} के उत्सव`;

            const firstDayIndex = new Date(year, month, 1).getDay(); 
            let startDay = firstDayIndex === 0 ? 6 : firstDayIndex - 1; 
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            const calendarGrid = document.getElementById("calendarGrid");
            calendarGrid.innerHTML = "";
            let eventsHtml = "";
            let hasEvents = false;

            for (let i = 0; i < startDay; i++) {
                calendarGrid.innerHTML += `<div class="calendar-day empty"></div>`;
            }

            for (let day = 1; day <= daysInMonth; day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                let dayClass = "calendar-day";
                let tooltip = "";

                if (festivalData[dateString]) {
                    dayClass += " festival-day";
                    tooltip = `title="${festivalData[dateString].title}"`;
                    hasEvents = true;
                    eventsHtml += `
                        <div class="event-card">
                            <h4>${day} ${hindiMonths[month]} - ${festivalData[dateString].title}</h4>
                            <p>${festivalData[dateString].desc}</p>
                        </div>`;
                }

                calendarGrid.innerHTML += `<div class="${dayClass}" ${tooltip}>${day}</div>`;
            }

            document.getElementById("eventList").innerHTML = hasEvents ? eventsHtml : `<div class="no-events">इस महीने कोई मुख्य उत्सव नहीं है।</div>`;
        }

        document.getElementById("prevBtn").addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(currentDate); });
        document.getElementById("nextBtn").addEventListener("click", () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(currentDate); });

        // Share Text
        document.getElementById("shareBtn").addEventListener("click", async () => {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            let text = `🌸 श्री टटिया स्थान उत्सव - ${hindiMonths[month]} ${year} 🌸\n\n`;
            let hasEvents = false;
            for (let day = 1; day <= new Date(year, month + 1, 0).getDate(); day++) {
                const dateString = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                if (festivalData[dateString]) {
                    hasEvents = true;
                    text += `🔹 ${day} ${hindiMonths[month]}:\n${festivalData[dateString].title}\n(${festivalData[dateString].desc})\n\n`;
                }
            }
            if(!hasEvents) text += "इस महीने कोई मुख्य उत्सव नहीं है।\n\n";
            text += "॥ श्यामा प्यारी कुंजबिहारी जै जै श्री हरिदास दुलारी ॥";

            if (navigator.share) {
                try { await navigator.share({ title: 'उत्सव पंचांग', text: text }); } catch (err) {}
            } else {
                navigator.clipboard.writeText(text); alert("उत्सवों की लिस्ट कॉपी हो गई है!");
            }
        });

        // PDF Print
        document.getElementById("printBtn").addEventListener("click", () => {
            const monthName = hindiMonths[currentDate.getMonth()];
            const printContent = document.createElement("div");
            printContent.style.padding = "30px"; printContent.style.fontFamily = "'Poppins', sans-serif"; printContent.style.background = "#fff";
            printContent.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px; border-bottom: 2px solid #d35400; padding-bottom: 10px;">
                    <h2 style="color: #d35400; margin: 0;">॥ श्री टटिया स्थान उत्सव ॥</h2>
                    <h3 style="margin: 5px 0; color:#000;">${monthName} ${currentDate.getFullYear()}</h3>
                </div>
                <div style="color:#000;">${document.getElementById("eventList").innerHTML}</div>
                <div style="text-align: center; margin-top: 40px; font-weight: bold; color: #555;">॥ श्यामा प्यारी कुंजबिहारी जै जै श्री हरिदास दुलारी ॥</div>`;
            
            const cards = printContent.querySelectorAll('.event-card');
            cards.forEach(card => { card.style.borderLeft = "5px solid #d35400"; card.style.padding = "15px"; card.style.marginBottom = "15px"; card.style.backgroundColor = "#fdfdfd"; });

            html2pdf().set({ margin: 0.5, filename: `Utsav_${monthName}_${currentDate.getFullYear()}.pdf`, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' } }).from(printContent).save();
        });

   // --- LIVE SYNC FEATURE (बिना रिफ्रेश किए डेटा अपडेट करने के लिए) ---
        
        // 1. जब भी एडमिन पैनल (दूसरे टैब) में डेटा सेव होगा, यह उसे तुरंत पकड़ लेगा
        window.addEventListener('storage', function(e) {
            if (e.key === 'tatiyaSthanFestivals') {
                // नया डेटा लोड करें
                festivalData = JSON.parse(e.newValue) || defaultFestivalData;
                // कैलेंडर को तुरंत फिर से बनाएं (बिना पेज रिफ्रेश किए)
                renderCalendar(currentDate);
            }
        });

        // 2. बैकअप के लिए: जब भी आप होम पेज वाले टैब पर वापस आएँगे, तो भी यह डेटा चेक करेगा
        window.addEventListener('focus', () => {
            const newData = JSON.parse(localStorage.getItem('tatiyaSthanFestivals'));
            if (newData) {
                festivalData = newData;
                renderCalendar(currentDate);
            }
        });

        renderCalendar(currentDate);
    </script>
</body>
</html>
